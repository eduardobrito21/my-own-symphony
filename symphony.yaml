# Symphony deployment config.
#
# ⚠️ Post-ADR 0014 (Plan 15): `execution:` was removed. The daemon
# polls + tracks state but dispatch is a no-op (NoopAgentRunner)
# until Plan 16 wires the in-process Claude SDK + sub-agent
# pipeline. Useful in the interim to verify config parsing,
# Linear connectivity, dashboard rendering.
#
# Run with: pnpm symphony symphony.yaml

polling:
  interval_ms: 30000

workspace:
  # Per-issue workspaces land at <root>/<projectKey>/<issueIdentifier>/
  root: ./.symphony-workspaces

agent:
  # Operator-side defaults. Per-repo workflow.md may override
  # `model` / budgets; daemon-wide caps (concurrency, timeouts)
  # are NOT overridable per-repo.
  #
  # Switched to Haiku 4.5 for the Plan 17a smoke (2026-05-17): the
  # 75k-token first prompt was blowing through Sonnet 4.6's 30k TPM
  # org cap, costing ~$0.30 per failed first attempt. Haiku has a
  # much higher TPM bucket and lower per-token cost; quality is
  # plenty for the MVP coder's "edit one file" job.
  model: claude-haiku-4-5-20251001
  max_concurrent_agents: 2
  max_turns: 20
  max_budget_usd: 1.0
  stall_timeout_ms: 0

hooks:
  timeout_ms: 60000

projects:
  - linear:
      # "Smoke Test" project on the EDU team. Pulled from
      # `pnpm tsx scripts/list-linear-projects.mjs` (slug is the
      # value after `/project/` in the Linear URL).
      project_slug: a532c6a9e9bb
      active_states: [Todo, 'In Progress']
      terminal_states: [Done, Cancelled, Canceled, Duplicate]
    repo:
      url: https://github.com/eduardobrito21/my-own-symphony-test.git
      default_branch: main
      workflow_path: .symphony/workflow.md
      branch_prefix: symphony/
